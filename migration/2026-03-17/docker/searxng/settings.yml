use_default_settings: true

server:
  bind_address: "0.0.0.0"
  limiter: false
  public_instance: false
  secret_key: "x7Kp9mN2vQ4wR8tY3uL6sJ1hF5dA0cE"

search:
  formats:
    - html
    - json
    - csv
    - rss
  autocomplete: "google"
  safe_search: 0

outgoing:
  request_timeout: 5.0
  max_request_timeout: 15.0
  useragent_suffix: "SearXNG"
  pool_connections: 100
  pool_maxsize: 20

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: bing
    engine: bing
    shortcut: b
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
